<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Portail Enseignants</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-box">

    <!-- Logo cliquable vers le site de l'école -->
    <a href="https://ec-tunis.com" target="_blank">
        <img src="logo.png" alt="Logo" class="logo" style="margin-bottom:20px; width:120px;">
    </a>

    <h2>Portail enseignants</h2>

    <input type="text" id="username" placeholder="Utilisateur">

    <input type="password" id="password" placeholder="Mot de passe">

    <button onclick="login()">Se connecter</button>

    <p id="error"></p>

</div>

<script src="auth.js"></script>

</body>

</html>
